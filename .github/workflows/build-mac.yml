name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install portaudio (for PyAudio)
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq pynput pyautogui pyperclip pystray Pillow PyQt6 pyaudio pyinstaller

      - name: Generate .icns icon
        run: |
          mkdir -p src/assets/icon.iconset
          # Use Python + Pillow to generate all sizes from the ICO (extracts largest frame)
          python3 - <<'EOF'
          from PIL import Image
          src = Image.open("src/assets/icon.ico")
          # ICO may have multiple frames - pick the largest
          try:
              sizes = src.info.get("sizes") or [src.size]
              largest = max(sizes, key=lambda s: s[0] * s[1])
              src.size = largest
              src.load()
          except Exception:
              pass
          src = src.convert("RGBA")
          # If the source is smaller than 1024, upscale with LANCZOS (best quality)
          if src.width < 1024:
              src = src.resize((1024, 1024), Image.LANCZOS)
          targets = [
              (16, "icon_16x16.png"),
              (32, "icon_16x16@2x.png"),
              (32, "icon_32x32.png"),
              (64, "icon_32x32@2x.png"),
              (128, "icon_128x128.png"),
              (256, "icon_128x128@2x.png"),
              (256, "icon_256x256.png"),
              (512, "icon_256x256@2x.png"),
              (512, "icon_512x512.png"),
              (1024, "icon_512x512@2x.png"),
          ]
          for size, name in targets:
              img = src.resize((size, size), Image.LANCZOS)
              img.save(f"src/assets/icon.iconset/{name}", "PNG")
              print(f"Generated {name} ({size}x{size})")
          EOF
          iconutil -c icns src/assets/icon.iconset -o src/assets/icon.icns

      - name: Build .app with PyInstaller
        run: pyinstaller build_mac.spec --clean -y

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Voxel" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Voxel.app" 175 190 \
            --hide-extension "Voxel.app" \
            --app-drop-link 425 190 \
            "dist/Voxel.dmg" \
            "dist/Voxel.app" || true
          # Fallback if create-dmg fails
          if [ ! -f "dist/Voxel.dmg" ]; then
            hdiutil create -volname "Voxel" -srcfolder "dist/Voxel.app" -ov -format UDZO "dist/Voxel.dmg"
          fi

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxel-macOS
          path: dist/Voxel.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Voxel.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

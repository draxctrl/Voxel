name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install portaudio (for PyAudio)
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install groq pynput pyautogui pyperclip pystray Pillow PyQt6 pyaudio pyinstaller

      - name: Generate .icns icon from .ico
        run: |
          mkdir -p src/assets/icon.iconset
          sips -z 16 16     src/assets/icon.ico --out src/assets/icon.iconset/icon_16x16.png
          sips -z 32 32     src/assets/icon.ico --out src/assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src/assets/icon.ico --out src/assets/icon.iconset/icon_32x32.png
          sips -z 64 64     src/assets/icon.ico --out src/assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src/assets/icon.ico --out src/assets/icon.iconset/icon_128x128.png
          sips -z 256 256   src/assets/icon.ico --out src/assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src/assets/icon.ico --out src/assets/icon.iconset/icon_256x256.png
          sips -z 512 512   src/assets/icon.ico --out src/assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src/assets/icon.ico --out src/assets/icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/assets/icon.ico --out src/assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns src/assets/icon.iconset -o src/assets/icon.icns

      - name: Build .app with PyInstaller
        run: pyinstaller build_mac.spec --clean -y

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Voxel" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Voxel.app" 175 190 \
            --hide-extension "Voxel.app" \
            --app-drop-link 425 190 \
            "dist/Voxel.dmg" \
            "dist/Voxel.app" || true
          # Fallback if create-dmg fails
          if [ ! -f "dist/Voxel.dmg" ]; then
            hdiutil create -volname "Voxel" -srcfolder "dist/Voxel.app" -ov -format UDZO "dist/Voxel.dmg"
          fi

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxel-macOS
          path: dist/Voxel.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Voxel.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
